services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cognitiontoday-rag-postgres
    environment:
      POSTGRES_DB: rag_blog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cognitiontoday-rag-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
